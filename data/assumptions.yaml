metadata:
  title: "Illustrative Quebec-style energy-drink retail age-check scenario"
  version: "0.1.0"
  evidence_status: "All numerical inputs are illustrative assumptions, not empirical estimates."
  unit_of_analysis: "Annual attempted retail purchases in a hypothetical population"

scenario:
  population: 100000
  purchase_attempt_rate:
    low: 0.18
    mode: 0.25
    high: 0.34
  minor_share:
    low: 0.13
    mode: 0.16
    high: 0.20
  higher_friction_adult_share:
    low: 0.06
    mode: 0.10
    high: 0.16

